<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Cardápio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <div class="header-content">
            <h1 class="logo">Cardápio</h1>
            <nav>
                {% if session.get('admin_logado') %}
                    <a href="{{ url_for('admin') }}">Admin</a>
                    <a href="{{ url_for('logout') }}" class="nav-sair">Sair</a>
                {% else %}
                    <a href="{{ url_for('cardapio') }}">Cardápio</a>
                    <a href="{{ url_for('carrinho') }}" class="nav-carrinho">
                        Carrinho
                        <span class="cart-badge" style="display:none">0</span>
                    </a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block conteudo %}{% endblock %}
    </main>

    <!-- Toast de feedback -->
    <div id="cart-toast"></div>

    <footer>
        <p>&copy; 2025 Cardápio de Salgados</p>
    </footer>

    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
