{% extends 'index.html' %}

{% block titulo %}Criar Produto{% endblock %}

{% block conteudo %}
<div class="form-container">
    <div class="form-titulo">
        <h2>Novo Produto</h2>
        <a href="{{ url_for('admin') }}" class="voltar">← Voltar</a>
    </div>

    <form method="POST" action="{{ url_for('criar_produto') }}" enctype="multipart/form-data">

        <div class="form-group">
            <label for="nome">Nome do Salgado *</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: Coxinha de Frango" required>
        </div>

        <div class="form-group">
            <label for="categoria">Categoria *</label>
            <select id="categoria" name="categoria" required>
                <option value="">Selecione...</option>
                <option value="Frito">Frito</option>
                <option value="Assado">Assado</option>
                <option value="Enrolado">Enrolado</option>
                <option value="Especial">Especial</option>
            </select>
        </div>

        <div class="form-group">
            <label for="preco">Preço (R$) *</label>
            <input type="text" id="preco" name="preco" placeholder="Ex: 5,00" required>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="3"
                placeholder="Ex: Coxinha recheada com frango desfiado e catupiry"></textarea>
        </div>

        <div class="form-group">
            <label for="imagem">Imagem do Produto</label>
            <input type="file" id="imagem" name="imagem" accept=".jpg,.jpeg,.png,.webp">
            <span class="hint">PNG, JPG ou WEBP. Máximo 5MB.</span>
            <div class="preview-box" id="preview-box" style="display:none">
                <img id="preview-img" src="" alt="Preview">
            </div>
        </div>

        <div class="form-group">
            <label for="estoque">Estoque inicial</label>
            <input type="number" id="estoque" name="estoque" min="0" placeholder="Deixe vazio para ilimitado">
            <span class="hint">Deixe em branco se não quiser controlar estoque deste produto.</span>
        </div>

        <div class="form-group form-check">
            <input type="checkbox" id="visivel" name="visivel" checked>
            <label for="visivel">Mostrar no cardápio</label>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('admin') }}" class="btn btn-cancelar">Cancelar</a>
            <button type="submit" class="btn btn-salvar">Salvar Produto</button>
        </div>

    </form>
</div>

<script>
    document.getElementById('imagem').addEventListener('change', function () {
        const file = this.files[0];
        const box = document.getElementById('preview-box');
        const img = document.getElementById('preview-img');
        if (file) {
            img.src = URL.createObjectURL(file);
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    });
</script>
{% endblock %}
