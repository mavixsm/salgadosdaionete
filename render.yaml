services:
  - type: web
    name: site-cardapio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: cardapio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: cardapio-db
    plan: free
